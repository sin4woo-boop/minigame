<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="capGlow" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#e8d0ff"/>
      <stop offset="50%" stop-color="#c29be8"/>
      <stop offset="100%" stop-color="#7b52a8"/>
    </radialGradient>
  </defs>
  <!-- Mushroom stem -->
  <rect x="26" y="38" width="12" height="16" rx="4" fill="#e8ddf0" stroke="#8a6aaa" stroke-width="1.5"/>
  <ellipse cx="32" cy="54" rx="10" ry="4" fill="#d4c4e0" stroke="#8a6aaa" stroke-width="1"/>
  <!-- Mushroom cap -->
  <ellipse cx="32" cy="34" rx="22" ry="18" fill="url(#capGlow)" stroke="#6c4ea5" stroke-width="2.5"/>
  <!-- Cap spots (toxic look) -->
  <circle cx="22" cy="28" r="4" fill="#f0e2ff" opacity="0.8"/>
  <circle cx="38" cy="24" r="3.5" fill="#f0e2ff" opacity="0.7"/>
  <circle cx="28" cy="38" r="2.8" fill="#f0e2ff" opacity="0.6"/>
  <circle cx="42" cy="33" r="2.5" fill="#f0e2ff" opacity="0.65"/>
  <circle cx="18" cy="36" r="2" fill="#f0e2ff" opacity="0.5"/>
  <!-- Spore particles floating -->
  <circle cx="12" cy="18" r="2" fill="#d4aaff" opacity="0.6"/>
  <circle cx="50" cy="14" r="1.8" fill="#d4aaff" opacity="0.5"/>
  <circle cx="8" cy="30" r="1.5" fill="#c898f0" opacity="0.45"/>
  <circle cx="54" cy="26" r="1.6" fill="#c898f0" opacity="0.4"/>
  <circle cx="16" cy="10" r="1.2" fill="#e0c0ff" opacity="0.35"/>
  <circle cx="48" cy="8" r="1.4" fill="#e0c0ff" opacity="0.3"/>
  <!-- Highlight on cap -->
  <ellipse cx="26" cy="26" rx="8" ry="5" fill="#f2e8ff" opacity="0.45" transform="rotate(-10 26 26)"/>
</svg>
