<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="kernelShine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fff5a0"/>
      <stop offset="40%" stop-color="#ffd84a"/>
      <stop offset="100%" stop-color="#d4950a"/>
