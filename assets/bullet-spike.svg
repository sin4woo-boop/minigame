<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="cactusCore" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#b8e88a"/>
      <stop offset="50%" stop-color="#79ab4f"/>
      <stop offset="100%" stop-color="#4a7a30"/>
    </radialGradient>
  </defs>
  <!-- Cactus body -->
  <circle cx="48" cy="48" r="28" fill="url(#cactusCore)" stroke="#355a2f" stroke-width="2.5"/>
  <!-- Inner rib lines -->
  <path d="M30 28 C34 48 34 68 30 74" stroke="#8ec664" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M42 22 C44 48 44 72 42 78" stroke="#97d06e" stroke-width="2.2" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M54 22 C52 48 52 72 54 78" stroke="#97d06e" stroke-width="2.2" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M66 28 C62 48 62 68 66 74" stroke="#8ec664" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Needle clusters (8 directions, sharper) -->
  <g stroke="#f5f7c8" stroke-width="2" stroke-linecap="round">
    <!-- Top -->
    <line x1="48" y1="20" x2="48" y2="8"/><line x1="44" y1="21" x2="42" y2="10"/><line x1="52" y1="21" x2="54" y2="10"/>
    <!-- Top-right -->
    <line x1="68" y1="28" x2="78" y2="18"/><line x1="70" y1="32" x2="82" y2="26"/><line x1="66" y1="26" x2="74" y2="14"/>
    <!-- Right -->
    <line x1="76" y1="48" x2="88" y2="48"/><line x1="75" y1="44" x2="86" y2="40"/><line x1="75" y1="52" x2="86" y2="56"/>
    <!-- Bottom-right -->
    <line x1="68" y1="68" x2="78" y2="78"/><line x1="70" y1="64" x2="82" y2="70"/><line x1="66" y1="70" x2="74" y2="82"/>
    <!-- Bottom -->
    <line x1="48" y1="76" x2="48" y2="88"/><line x1="44" y1="75" x2="42" y2="86"/><line x1="52" y1="75" x2="54" y2="86"/>
    <!-- Bottom-left -->
    <line x1="28" y1="68" x2="18" y2="78"/><line x1="26" y1="64" x2="14" y2="70"/><line x1="30" y1="70" x2="22" y2="82"/>
    <!-- Left -->
    <line x1="20" y1="48" x2="8" y2="48"/><line x1="21" y1="44" x2="10" y2="40"/><line x1="21" y1="52" x2="10" y2="56"/>
    <!-- Top-left -->
    <line x1="28" y1="28" x2="18" y2="18"/><line x1="26" y1="32" x2="14" y2="26"/><line x1="30" y1="26" x2="22" y2="14"/>
  </g>
  <!-- Inner spine cross with glow -->
  <g stroke="#e6eaa9" stroke-width="1.8" stroke-linecap="round">
    <line x1="48" y1="36" x2="48" y2="60"/>
    <line x1="36" y1="48" x2="60" y2="48"/>
    <line x1="40" y1="40" x2="56" y2="56"/>
    <line x1="56" y1="40" x2="40" y2="56"/>
  </g>
  <!-- Highlight -->
  <ellipse cx="38" cy="38" rx="10" ry="12" fill="#c8f0a0" opacity="0.35" transform="rotate(-15 38 38)"/>
  <!-- Needle tips glow -->
  <circle cx="48" cy="8" r="2" fill="#fffff0" opacity="0.5"/>
  <circle cx="88" cy="48" r="2" fill="#fffff0" opacity="0.4"/>
  <circle cx="48" cy="88" r="2" fill="#fffff0" opacity="0.4"/>
  <circle cx="8" cy="48" r="2" fill="#fffff0" opacity="0.4"/>
</svg>
