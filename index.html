<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>동물 카드 뒤집기 미니게임</title>
    <style>
      :root {
        --bg: #f3fbff;
        --card-back: #6ec1ff;
        --card-front: #ffffff;
        --accent: #ff9d00;
        --text: #263238;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Noto Sans KR", system-ui, -apple-system, Segoe UI, sans-serif;
        background:
          radial-gradient(circle at 10% 20%, #ffd7a6 0%, rgba(255, 215, 166, 0) 42%),
          radial-gradient(circle at 85% 18%, #b8f3ff 0%, rgba(184, 243, 255, 0) 44%),
          radial-gradient(circle at 50% 100%, #d8ffe2 0%, rgba(216, 255, 226, 0) 45%),
          linear-gradient(145deg, #f4fbff 0%, #eef8ff 45%, #f6fff7 100%);
        color: var(--text);
        padding: 1rem;
      }

      .game {
        width: min(95vw, 760px);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(4px);
        border-radius: 18px;
        padding: 1rem;
        box-shadow: 0 14px 30px rgba(36, 82, 118, 0.15);
      }

      .title {
        margin: 0 0 0.3rem;
        text-align: center;
        font-size: clamp(1.4rem, 2.7vw, 2rem);
      }

      .description {
        margin: 0 0 1rem;
        text-align: center;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.7rem;
        align-items: center;
        margin-bottom: 0.8rem;
      }

      .link-box {
        font-size: 0.86rem;
        padding: 0.45rem 0.65rem;
        border: 1px dashed #a3cce7;
        border-radius: 12px;
        background: #f8fdff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .controls,
      .hud {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 0.6rem 0.9rem;
        margin-bottom: 0.8rem;
        font-weight: 700;
      }

      select,
      button {
        border: 0;
        background: var(--accent);
        color: #fff;
        font-size: 0.92rem;
        padding: 0.5rem 0.85rem;
        border-radius: 999px;
        cursor: pointer;
      }

      select {
        background: #4aa9eb;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(var(--cols, 4), minmax(52px, 1fr));
        gap: 0.62rem;
      }

      .card {
        display: block;
        position: relative;
        width: 100%;
        height: 0;
        padding-bottom: 100%;
        border: 0;
        background: transparent;
        cursor: pointer;
        perspective: 600px;
      }

      .card:focus-visible {
        outline: 3px solid rgba(255, 157, 0, 0.55);
        outline-offset: 2px;
      }

      .inner {
        position: absolute;
        inset: 0;
        transition: transform 0.35s ease;
        transform-style: preserve-3d;
      }

      .card.flipped .inner,
      .card.matched .inner {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        border-radius: 14px;
        display: grid;
        place-items: center;
        backface-visibility: hidden;
        font-size: clamp(1.7rem, 4.8vw, 2.4rem);
        box-shadow: 0 6px 14px rgba(19, 46, 66, 0.14);
      }

      .back {
        overflow: hidden;
        color: #0f6f97;
        font-size: clamp(2rem, 5vw, 2.8rem);
        font-weight: 900;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.45);
        background:
          radial-gradient(circle at 24% 20%, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0) 36%),
          radial-gradient(circle at 78% 84%, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0) 42%),
          repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0 8px, rgba(255, 255, 255, 0) 8px 16px),
          linear-gradient(145deg, #3caff7 0%, #48c6f9 45%, #35a6ea 100%);
      }

      .back::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.34));
        mix-blend-mode: screen;
      }

      .front {
        transform: rotateY(180deg);
        background:
          radial-gradient(circle at 22% 16%, #fff8e8 0%, rgba(255, 248, 232, 0) 38%),
          linear-gradient(150deg, #ffffff 0%, #fefdf6 42%, #f5fff8 100%);
        font-size: clamp(2.05rem, 6.1vw, 3.35rem);
      }

      .status {
        margin-top: 0.9rem;
        text-align: center;
        font-size: 1rem;
        min-height: 1.5em;
      }

      .result-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(14, 30, 42, 0.42);
        backdrop-filter: blur(2px);
        z-index: 100;
      }

      .result-modal[hidden] {
        display: none;
      }

      .result-card {
        width: min(92vw, 420px);
        background: linear-gradient(160deg, #ffffff 0%, #f7fcff 50%, #f6fff8 100%);
        border-radius: 18px;
        box-shadow: 0 16px 30px rgba(12, 35, 49, 0.28);
        padding: 1rem 1rem 1.1rem;
        border: 1px solid #dceef8;
      }

      .result-title {
        margin: 0 0 0.45rem;
        font-size: 1.3rem;
        text-align: center;
      }

      .result-summary {
        margin: 0;
        font-size: 0.98rem;
        text-align: center;
        color: #294054;
      }

      .result-stats {
        margin: 0.9rem 0 1rem;
        padding: 0.7rem 0.8rem;
        border-radius: 12px;
        background: #eef8ff;
        font-weight: 700;
        display: grid;
        gap: 0.35rem;
      }

      .result-actions {
        display: flex;
        justify-content: center;
        gap: 0.55rem;
        flex-wrap: wrap;
      }

      .result-close {
        background: #4aa9eb;
      }

      @media (max-width: 540px) {
        .game {
          padding: 0.8rem;
        }

        .grid {
          gap: 0.5rem;
        }

        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="game">
      <h1 class="title">🐾 동물 카드 뒤집기</h1>
      <p class="description">같은 동물 이모지 2개를 찾아보세요!</p>

      <section class="toolbar" aria-label="접속 링크">
        <div class="link-box" id="share-link"></div>
        <button id="copy-link" type="button">링크 복사</button>
      </section>

      <section class="controls" aria-label="게임 설정">
        <label>
          난이도
          <select id="difficulty">
            <option value="easy">쉬움 (3x4)</option>
            <option value="normal" selected>보통 (4x4)</option>
            <option value="hard">어려움 (4x5)</option>
          </select>
        </label>
        <button id="restart" type="button">다시 하기</button>
      </section>

      <section class="hud" aria-label="게임 정보">
        <div id="moves">시도: 0</div>
        <div id="timer">시간: 0초</div>
        <div id="score">점수: 0점</div>
        <div id="best">최고기록: -</div>
      </section>

      <section class="grid" id="grid" aria-label="카드 게임판"></section>
      <p class="status" id="status" aria-live="polite"></p>
    </main>

    <section class="result-modal" id="result-modal" hidden aria-label="클리어 결과">
      <div class="result-card" role="dialog" aria-modal="true" aria-labelledby="result-title">
        <h2 class="result-title" id="result-title">🎉 클리어 성공!</h2>
        <p class="result-summary" id="result-summary"></p>
        <div class="result-stats" id="result-stats"></div>
        <div class="result-actions">
          <button class="result-close" id="result-close" type="button">닫기</button>
          <button id="result-restart" type="button">다시 하기</button>
        </div>
      </div>
    </section>

    <script>
      const ANIMALS = ["🐶", "🐱", "🐰", "🐼", "🦊", "🐸", "🐯", "🐨", "🦁", "🐮", "🐵", "🦄"];
      const CONFIG = {
        easy: { pairs: 6, cols: 3, label: "쉬움" },
        normal: { pairs: 8, cols: 4, label: "보통" },
        hard: { pairs: 10, cols: 4, label: "어려움" },
      };

      const grid = document.getElementById("grid");
      const movesEl = document.getElementById("moves");
      const timerEl = document.getElementById("timer");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const statusEl = document.getElementById("status");
      const restartBtn = document.getElementById("restart");
      const difficultyEl = document.getElementById("difficulty");
      const shareLinkEl = document.getElementById("share-link");
      const copyLinkBtn = document.getElementById("copy-link");
      const resultModalEl = document.getElementById("result-modal");
      const resultSummaryEl = document.getElementById("result-summary");
      const resultStatsEl = document.getElementById("result-stats");
      const resultCloseBtn = document.getElementById("result-close");
      const resultRestartBtn = document.getElementById("result-restart");

      let deck = [];
      let openCards = [];
      let lock = false;
      let moves = 0;
      let matchedCount = 0;
      let score = 0;
      let startedAt = null;
      let timerId = null;

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function getConfig() {
        return CONFIG[difficultyEl.value] ?? CONFIG.normal;
      }

      function getElapsedSeconds() {
        if (!startedAt) {
          return 0;
        }
        return Math.floor((Date.now() - startedAt) / 1000);
      }

      function playTone(type) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) {
          return;
        }

        const context = new AudioCtx();
        const osc = context.createOscillator();
        const gain = context.createGain();
        const map = { flip: 440, match: 660, win: 880, miss: 220 };

        osc.type = "triangle";
        osc.frequency.value = map[type] || 400;
        gain.gain.value = 0.05;

        osc.connect(gain);
        gain.connect(context.destination);
        osc.start();
        osc.stop(context.currentTime + (type === "win" ? 0.24 : 0.12));
        osc.onended = () => context.close();
      }

      function updateHud() {
        movesEl.textContent = `시도: ${moves}`;
        timerEl.textContent = `시간: ${getElapsedSeconds()}초`;
        scoreEl.textContent = `점수: ${score}점`;
      }

      function getBestKey() {
        return `animal-memory-best-${difficultyEl.value}`;
      }

      function refreshBestScore() {
        const stored = localStorage.getItem(getBestKey());
        if (!stored) {
          bestEl.textContent = "최고기록: -";
          return;
        }

        const parsed = JSON.parse(stored);
        bestEl.textContent = `최고기록: ${parsed.score}점 (${parsed.time}초)`;
      }

      function maybeSaveBest() {
        const key = getBestKey();
        const current = { score, time: getElapsedSeconds() };
        const old = localStorage.getItem(key);
        if (!old) {
          localStorage.setItem(key, JSON.stringify(current));
          refreshBestScore();
          return;
        }

        const parsed = JSON.parse(old);
        if (current.score > parsed.score || (current.score === parsed.score && current.time < parsed.time)) {
          localStorage.setItem(key, JSON.stringify(current));
          refreshBestScore();
        }
      }

      function makeDeck() {
        const { pairs, cols } = getConfig();
        const selected = ANIMALS.slice(0, pairs);
        grid.style.setProperty("--cols", cols);

        return shuffle([...selected, ...selected]).map((emoji, index) => ({
          id: index,
          emoji,
        }));
      }

      function renderBoard() {
        grid.innerHTML = "";

        deck.forEach((card) => {
          const button = document.createElement("div");
          button.className = "card";
          button.dataset.id = card.id;
          button.setAttribute("role", "button");
          button.setAttribute("tabindex", "0");
          button.setAttribute("aria-label", "카드 뒤집기");

          button.innerHTML = `
            <span class="inner">
              <span class="face back">?</span>
              <span class="face front">${card.emoji}</span>
            </span>
          `;

          button.addEventListener("click", () => onCardClick(button, card));
          button.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              onCardClick(button, card);
            }
          });
          grid.appendChild(button);
        });
      }

      function startTimer() {
        if (timerId) {
          return;
        }

        startedAt = Date.now();
        timerId = setInterval(updateHud, 1000);
      }

      function stopTimer() {
        if (!timerId) {
          return;
        }

        clearInterval(timerId);
        timerId = null;
      }

      function closeResultModal() {
        resultModalEl.hidden = true;
      }

      function openResultModal({ level, elapsed }) {
        resultSummaryEl.textContent = `${level} 난이도 클리어! 정말 잘했어요.`;
        resultStatsEl.innerHTML = `
          <div>점수: ${score}점</div>
          <div>시간: ${elapsed}초</div>
          <div>시도: ${moves}번</div>
        `;
        resultModalEl.hidden = false;
      }

      function resetGame() {
        stopTimer();
        closeResultModal();
        deck = makeDeck();
        openCards = [];
        lock = false;
        moves = 0;
        matchedCount = 0;
        score = 0;
        startedAt = null;
        statusEl.textContent = "";
        refreshBestScore();
        updateHud();
        renderBoard();
      }

      function markMatched(firstBtn, secondBtn, emoji) {
        firstBtn.classList.add("matched");
        secondBtn.classList.add("matched");
        matchedCount += 2;
        score += 100;
        statusEl.textContent = `${emoji} 친구 찾기 성공!`;
        playTone("match");
      }

      function flipBack(firstBtn, secondBtn) {
        setTimeout(() => {
          firstBtn.classList.remove("flipped");
          secondBtn.classList.remove("flipped");
          lock = false;
          score = Math.max(0, score - 10);
          statusEl.textContent = "아쉬워요! 다른 카드를 골라보세요!";
          updateHud();
          playTone("miss");
        }, 650);
      }

      function onCardClick(button, card) {
        if (lock || button.classList.contains("flipped") || button.classList.contains("matched")) {
          return;
        }

        if (!startedAt) {
          startTimer();
        }

        button.classList.add("flipped");
        openCards.push({ button, card });
        playTone("flip");

        if (openCards.length < 2) {
          return;
        }

        moves += 1;
        updateHud();

        const [first, second] = openCards;
        openCards = [];

        if (first.card.emoji === second.card.emoji) {
          markMatched(first.button, second.button, first.card.emoji);

          if (matchedCount === deck.length) {
            stopTimer();
            const elapsed = getElapsedSeconds();
            score += Math.max(0, 300 - elapsed * 3 - moves * 5);
            updateHud();
            maybeSaveBest();
            const level = getConfig().label;
            statusEl.textContent = `🎉 ${level} 난이도 클리어! ${elapsed}초 / ${moves}번 시도`;
            openResultModal({ level, elapsed });
            playTone("win");
          }
          return;
        }

        lock = true;
        flipBack(first.button, second.button);
      }

      function setShareLink() {
        shareLinkEl.textContent = `모바일 접속 링크: ${window.location.href}`;
      }

      async function copyLink() {
        try {
          await navigator.clipboard.writeText(window.location.href);
          statusEl.textContent = "링크가 복사됐어요! 모바일에서 열어보세요 📱";
        } catch (error) {
          statusEl.textContent = "복사가 어려워요. 링크를 길게 눌러 복사해 주세요.";
        }
      }

      restartBtn.addEventListener("click", resetGame);
      difficultyEl.addEventListener("change", resetGame);
      copyLinkBtn.addEventListener("click", copyLink);
      resultCloseBtn.addEventListener("click", closeResultModal);
      resultRestartBtn.addEventListener("click", resetGame);
      resultModalEl.addEventListener("click", (event) => {
        if (event.target === resultModalEl) {
          closeResultModal();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !resultModalEl.hidden) {
          closeResultModal();
        }
      });

      setShareLink();
      resetGame();
    </script>
  </body>
</html>
